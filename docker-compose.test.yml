version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=test_db
    ports:
      - "5432:5432"
    volumes:
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/test_db
      - JWT_SECRET=test-secret
      - AI_PROVIDER=huggingface
      - RUST_LOG=debug
    depends_on:
      - db
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:3000
    ports:
      - "3001:3000"
    depends_on:
      - backend
